{{- $node := . -}}
{{- partial "node_open.html" $node | safeHTML -}}
  {{- range $node.children -}}
    {{- partial "node.html" . | safeHTML -}}
  {{- end -}}
  {{- with $node.form_control -}}
    {{- partial "form_control.html" . | safeHTML -}}
  {{- end -}}
{{- partial "node_close.html" $node | safeHTML -}}
