<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2200" viewBox="0 0 1600 2200" role="img" aria-labelledby="title desc">
  <title id="title">Crash test figma2hugo - version Figma</title>
  <desc id="desc">Planche SVG importable dans Figma avec une structure de page canonique pour les crash tests.</desc>

  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f2ea"/>
      <stop offset="100%" stop-color="#fffaf5"/>
    </linearGradient>
    <linearGradient id="heroGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#12306b"/>
      <stop offset="100%" stop-color="#315da8"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#1c2430" flood-opacity="0.12"/>
    </filter>
    <style>
      .heading { font-family: 'Segoe UI', Arial, sans-serif; fill: #12306b; }
      .label { font-family: 'Segoe UI', Arial, sans-serif; fill: #2c241d; }
      .muted { font-family: 'Segoe UI', Arial, sans-serif; fill: #7b6c5f; }
      .mono { font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace; fill: #2c241d; }
      .section-card { fill: #fffdf9; stroke: #dfd2c1; stroke-width: 2; rx: 28; }
      .mini { fill: #f7f1e8; stroke: #e7dccf; stroke-width: 1.5; rx: 16; }
      .accent { fill: #d06c63; }
      .accentText { fill: #fffaf4; font-family: 'Segoe UI', Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1600" height="2200" fill="url(#pageBg)"/>

  <g id="page-crash-test-1920">
    <rect x="48" y="48" width="1504" height="2104" rx="34" fill="#fffefa" stroke="#e2d7c7" stroke-width="2" filter="url(#softShadow)"/>

    <text x="88" y="112" class="heading" font-size="38" font-weight="700">Crash Test Canonique</text>
    <text x="88" y="148" class="muted" font-size="20">Version Figma importable • page unique de validation du convertisseur</text>

    <g id="seo-meta">
      <rect x="88" y="184" width="1424" height="84" class="mini"/>
      <text x="116" y="220" class="heading" font-size="20" font-weight="700">Meta</text>
      <text x="116" y="248" class="mono" font-size="18">seo-title  •  seo-description</text>
    </g>

    <g id="section-hero">
      <rect x="88" y="296" width="1424" height="208" rx="32" fill="url(#heroGrad)"/>
      <text x="124" y="344" class="accentText" font-size="30" font-weight="700">section-hero</text>
      <text x="124" y="386" class="accentText" font-size="22">bg-hero • decor-hero-gauche • decor-hero-droite</text>
      <text x="124" y="426" class="accentText" font-size="22">hero-content → titre-h1-hero • texte-hero • button-hero</text>
      <text x="124" y="466" class="accentText" font-size="22">hero-media → image-hero</text>
    </g>

    <g id="section-prestation">
      <rect x="88" y="540" width="1424" height="220" class="section-card"/>
      <text x="120" y="588" class="heading" font-size="28" font-weight="700">section-prestation</text>
      <text x="120" y="624" class="mono" font-size="19">section-block-prestation</text>
      <text x="120" y="656" class="mono" font-size="19">row-prestation</text>
      <text x="160" y="692" class="mono" font-size="18">col-prestation-content → titre-h2-prestation • texte-prestation • button-prestation</text>
      <text x="160" y="726" class="mono" font-size="18">col-prestation-media → bg-media-prestation • image-prestation • decor-prestation-1 • decor-prestation-2</text>
    </g>

    <g id="section-cas-clients">
      <rect x="88" y="796" width="1424" height="276" class="section-card"/>
      <text x="120" y="844" class="heading" font-size="28" font-weight="700">section-cas-clients</text>
      <text x="120" y="880" class="mono" font-size="19">titre-h2-cas-clients</text>
      <text x="120" y="912" class="mono" font-size="19">link-grid-cas-clients</text>
      <text x="160" y="948" class="mono" font-size="18">link-row-1 → href-card-projet-1-external • href-card-projet-2</text>
      <text x="196" y="982" class="mono" font-size="17">bg-card-* • image-card-* • href-* • link-label-* • texte-*</text>
      <text x="160" y="1018" class="mono" font-size="18">link-row-2 → href-card-projet-3</text>
      <text x="196" y="1052" class="mono" font-size="17">bg-card-* • image-card-* • href-* • link-label-* • texte-*</text>
    </g>

    <g id="section-faq">
      <rect x="88" y="1108" width="690" height="288" class="section-card"/>
      <text x="120" y="1156" class="heading" font-size="28" font-weight="700">section-faq</text>
      <text x="120" y="1192" class="mono" font-size="19">titre-h2-faq</text>
      <text x="120" y="1226" class="mono" font-size="19">accordion-single-faq</text>
      <text x="156" y="1262" class="mono" font-size="17">accordion-item-1-open</text>
      <text x="196" y="1294" class="mono" font-size="16">accordion-panel-1 → texte-reponse-1</text>
      <text x="196" y="1324" class="mono" font-size="16">accordion-trigger-1 → texte-question-1</text>
      <text x="156" y="1358" class="mono" font-size="17">accordion-item-2-closed / accordion-item-3-closed</text>
    </g>

    <g id="section-carousel">
      <rect x="822" y="1108" width="690" height="288" class="section-card"/>
      <text x="854" y="1156" class="heading" font-size="28" font-weight="700">section-carousel</text>
      <text x="854" y="1192" class="mono" font-size="19">titre-h2-carousel</text>
      <text x="854" y="1226" class="mono" font-size="19">carousel-gallery</text>
      <text x="890" y="1262" class="mono" font-size="17">carousel-stage-gallery</text>
      <text x="930" y="1294" class="mono" font-size="16">carousel-slide-1-active • carousel-slide-2 • carousel-slide-3</text>
      <text x="890" y="1330" class="mono" font-size="17">carousel-thumbs-gallery</text>
      <text x="930" y="1362" class="mono" font-size="16">carousel-thumb-1 • carousel-thumb-2 • carousel-thumb-3</text>
    </g>

    <g id="section-contact">
      <rect x="88" y="1432" width="1424" height="456" class="section-card"/>
      <text x="120" y="1480" class="heading" font-size="28" font-weight="700">section-contact</text>
      <text x="120" y="1516" class="mono" font-size="19">titre-h2-contact</text>
      <text x="120" y="1550" class="mono" font-size="19">formulaire-contact-post</text>

      <rect x="120" y="1578" width="640" height="256" class="mini"/>
      <text x="148" y="1614" class="mono" font-size="17">bg-contact-formulaire</text>
      <text x="148" y="1648" class="mono" font-size="16">input-nom-prenom-required → zone-nom-prenom • placeholder-nom-prenom</text>
      <text x="148" y="1680" class="mono" font-size="16">input-societe → zone-societe • placeholder-societe</text>
      <text x="148" y="1712" class="mono" font-size="16">ligne-contact → input-telephone • input-mail-required</text>
      <text x="148" y="1744" class="mono" font-size="16">input-select-demande-required → zone-demande • option-*</text>
      <text x="148" y="1776" class="mono" font-size="16">input-message-required → zone-message • placeholder-message</text>
      <text x="148" y="1808" class="mono" font-size="16">action-contact</text>

      <g id="button-envoyer">
        <polygon points="1030,1708 1220,1708 1188,1764 998,1764" class="accent"/>
        <text x="1054" y="1746" class="accentText" font-size="22" font-weight="700">button-envoyer</text>
      </g>
    </g>

    <g id="footer-site">
      <rect x="88" y="1924" width="1424" height="168" class="section-card"/>
      <text x="120" y="1972" class="heading" font-size="28" font-weight="700">footer-site</text>
      <text x="120" y="2008" class="mono" font-size="18">footer-content</text>
      <text x="156" y="2042" class="mono" font-size="17">footer-brand → logo-footer • texte-footer-brand</text>
      <text x="156" y="2074" class="mono" font-size="17">footer-nav → href-card-footer-1 → href-footer-1 • link-label-footer-1</text>
      <text x="156" y="2106" class="mono" font-size="17">footer-legal → texte-footer-legal</text>
    </g>
  </g>
</svg>
